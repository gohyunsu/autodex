<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dataset Gallery - AutoDex</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    .viewer-container {
      max-width: 1500px;
      padding-top: 18px;
    }

    .gallery-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 18px;
      margin-bottom: 14px;
    }

    .gallery-kicker {
      color: var(--accent-hover);
      font-size: .78em;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .gallery-title {
      margin-top: 4px;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .summary-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .explorer-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .control-deck,
    .viewer-main {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
    }

    .control-deck {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(160px, 1.15fr) repeat(5, minmax(118px, .8fr));
      gap: 8px;
      padding: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: .72em;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .field input,
    .field select {
      min-height: 38px;
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .viewer-main {
      overflow: hidden;
    }

    .viewer-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .selected-title {
      min-width: 0;
    }

    .selected-title h2 {
      font-size: 1.08em;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selected-title .sub {
      margin-top: 2px;
      color: var(--text-muted);
      font-size: .82em;
    }

    .mode-tabs {
      display: inline-flex;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
    }

    .mode-btn {
      min-height: 34px;
      padding: 7px 12px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--text-muted);
      font-size: .84em;
      font-weight: 800;
    }

    .mode-btn:last-child {
      border-right: 0;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .screen-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #080808;
    }

    .screen-wrap video,
    .screen-wrap model-viewer,
    .screen-placeholder {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .screen-wrap video {
      display: block;
      object-fit: contain;
      background: #080808;
    }

    .screen-placeholder {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      color: rgba(255, 255, 255, .82);
      text-align: center;
      background:
        linear-gradient(135deg, rgba(226, 96, 59, .16), rgba(20, 20, 20, .2)),
        #111;
    }

    .screen-placeholder.visible {
      display: flex;
    }

    .placeholder-box {
      width: min(460px, 100%);
    }

    .placeholder-box h3 {
      margin-bottom: 8px;
      color: #fff;
      font-size: 1.02em;
    }

    .placeholder-box p {
      color: rgba(255, 255, 255, .72);
      font-size: .9em;
      line-height: 1.45;
    }

    .playback-rail {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 54px;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      color: rgba(255, 255, 255, .68);
      font-size: .78em;
      font-weight: 800;
    }

    .playback-rail input {
      width: 100%;
      accent-color: var(--accent);
    }

    .selector-stack {
      background: #fcfbf9;
      border-top: 1px solid var(--line);
    }

    .selector-row {
      border-bottom: 1px solid var(--line);
    }

    .selector-row-header {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) auto 18px;
      gap: 8px;
      align-items: center;
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 0;
      background: transparent;
      text-align: left;
    }

    .selector-row-header:hover {
      background: #f6f1eb;
    }

    .selector-row-label {
      color: var(--text);
      font-size: .8em;
      font-weight: 850;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    .selector-row-value {
      min-width: 0;
      color: var(--text-muted);
      font-size: .82em;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selector-row-count {
      color: var(--text-muted);
      font-size: .74em;
      font-weight: 800;
      white-space: nowrap;
    }

    .selector-chevron {
      color: var(--text-muted);
      font-size: 1.2em;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      transition: transform .16s;
    }

    .selector-row.open .selector-chevron {
      transform: rotate(90deg);
    }

    .selector-rail {
      display: none;
      gap: 8px;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-x: contain;
      padding: 0 10px 8px 90px;
      scrollbar-width: thin;
    }

    .selector-row.open .selector-rail {
      display: flex;
    }

    .object-tile,
    .pose-tile,
    .view-tile {
      flex: 0 0 178px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      text-align: left;
      transition: border-color .16s, box-shadow .16s, transform .16s;
    }

    .object-tile:hover,
    .pose-tile:hover,
    .view-tile:hover,
    .object-tile.active,
    .pose-tile.active,
    .view-tile.active {
      border-color: var(--accent);
      box-shadow: var(--shadow-lift);
      transform: translateY(-1px);
    }

    .pose-tile {
      flex-basis: 210px;
    }

    .object-tile img,
    .pose-tile video,
    .view-tile video {
      width: 100%;
      height: 108px;
      display: block;
      background: var(--surface-2);
      object-fit: cover;
    }

    .object-tile img {
      height: 108px;
    }

    .tile-body {
      padding: 7px 8px 8px;
    }

    .tile-title {
      font-size: .82em;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile-sub {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: .7em;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selector-stack .tile-sub,
    .selector-stack .status-line {
      display: none;
    }

    .status-line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .empty-inline {
      padding: 24px;
      color: var(--text-muted);
      text-align: center;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
    }

    @media (max-width: 1180px) {
      .control-deck {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .explorer-layout {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 760px) {
      .viewer-container {
        padding-left: 14px;
        padding-right: 14px;
      }

      .gallery-head,
      .control-deck {
        grid-template-columns: 1fr;
      }

      .summary-pills {
        justify-content: flex-start;
      }

      .viewer-topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .mode-tabs,
      .mode-btn {
        width: 100%;
      }

      .mode-btn {
        flex: 1;
      }

      .selector-row-header {
        grid-template-columns: 64px minmax(0, 1fr) auto 18px;
      }

      .selector-rail {
        padding-left: 10px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="index.html">AutoDex</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="gallery.html" class="cta">Gallery</a>
      <a href="experiments.html">Experiments</a>
    </div>
  </nav>

  <main class="container viewer-container">
    <header class="gallery-head">
      <div>
        <div class="gallery-kicker">Dataset Gallery</div>
        <h1 class="gallery-title">Episode Viewer</h1>
      </div>
      <div class="summary-pills" id="summary-pills"></div>
    </header>

    <section class="control-deck" aria-label="Gallery controls">
      <div class="field">
        <label for="search">Search</label>
        <input id="search" type="search" placeholder="object, grasp, scene">
      </div>
      <div class="field">
        <label for="hand-filter">Hand</label>
        <select id="hand-filter">
          <option value="all">All hands</option>
          <option value="allegro">Allegro</option>
          <option value="inspire">Inspire</option>
        </select>
      </div>
      <div class="field">
        <label for="status-filter">Outcome</label>
        <select id="status-filter">
          <option value="all">All outcomes</option>
          <option value="success">Success only</option>
          <option value="fail">Fail only</option>
        </select>
      </div>
      <div class="field">
        <label for="scene-filter">Scene</label>
        <select id="scene-filter">
          <option value="all">All scenes</option>
        </select>
      </div>
      <div class="field">
        <label for="object-filter">Object</label>
        <select id="object-filter">
          <option value="all">All objects</option>
        </select>
      </div>
      <div class="field">
        <label for="episode-select">Episode / grasp</label>
        <select id="episode-select"></select>
      </div>
    </section>

    <section class="explorer-layout">
      <section class="viewer-main" aria-label="Main episode panel">
        <div class="viewer-topbar">
          <div class="selected-title">
            <h2 id="selected-title">Loading...</h2>
            <div class="sub" id="selected-subtitle"></div>
          </div>
          <div class="mode-tabs" role="group" aria-label="Content mode">
            <button class="mode-btn active" id="mode-video" data-mode="video">Video</button>
            <button class="mode-btn" id="mode-3d" data-mode="reconstruction">Interactive 3D</button>
          </div>
        </div>

        <div class="selector-stack" aria-label="Thumbnail selectors">
          <section class="selector-row" id="object-selector" data-selector="object">
            <button class="selector-row-header" id="object-header" type="button" aria-expanded="false" aria-controls="object-strip">
              <span class="selector-row-label">Object</span>
              <span class="selector-row-value" id="object-value">-</span>
              <span class="selector-row-count" id="object-count"></span>
              <span class="selector-chevron">&rsaquo;</span>
            </button>
            <div class="selector-rail object-strip" id="object-strip"></div>
          </section>

          <section class="selector-row" id="pose-selector" data-selector="pose">
            <button class="selector-row-header" id="pose-header" type="button" aria-expanded="false" aria-controls="pose-strip">
              <span class="selector-row-label">Pose</span>
              <span class="selector-row-value" id="pose-value">-</span>
              <span class="selector-row-count" id="pose-count"></span>
              <span class="selector-chevron">&rsaquo;</span>
            </button>
            <div class="selector-rail pose-strip" id="pose-strip"></div>
          </section>

          <section class="selector-row" id="view-selector" data-selector="view">
            <button class="selector-row-header" id="view-header" type="button" aria-expanded="false" aria-controls="view-strip">
              <span class="selector-row-label">View</span>
              <span class="selector-row-value" id="view-value">-</span>
              <span class="selector-row-count" id="view-count"></span>
              <span class="selector-chevron">&rsaquo;</span>
            </button>
            <div class="selector-rail view-strip" id="view-strip"></div>
          </section>
        </div>

        <div class="screen-wrap">
          <video id="main-video" controls muted loop playsinline preload="metadata"></video>
          <div class="screen-placeholder" id="pending-layer">
            <div class="placeholder-box">
              <h3 id="pending-title">Asset pending</h3>
              <p id="pending-copy"></p>
              <div class="playback-rail">
                <span>0:00</span>
                <input type="range" min="0" max="100" value="0" disabled>
                <span>0:00</span>
              </div>
            </div>
          </div>
          <model-viewer id="model-viewer" camera-controls auto-rotate shadow-intensity="0.25" style="display:none;"></model-viewer>
        </div>
      </section>
    </section>
  </main>

  <script>
    const HF_BASE = 'https://huggingface.co/datasets/willi19/autodex-gallery/resolve/main';
    const state = {
      catalog: [],
      experiments: {},
      assets: {objects: {}},
      episodes: [],
      currentKey: null,
      currentCamera: null,
      openSelector: null,
      mode: 'video'
    };

    const els = {};
    [
      'summary-pills',
      'search',
      'hand-filter',
      'status-filter',
      'scene-filter',
      'object-filter',
      'episode-select',
      'object-selector',
      'pose-selector',
      'view-selector',
      'object-header',
      'pose-header',
      'view-header',
      'object-value',
      'pose-value',
      'view-value',
      'selected-title',
      'selected-subtitle',
      'main-video',
      'pending-layer',
      'pending-title',
      'pending-copy',
      'model-viewer',
      'object-strip',
      'object-count',
      'pose-strip',
      'pose-count',
      'view-strip',
      'view-count'
    ].forEach(id => { els[id] = document.getElementById(id); });

    Promise.all([
      fetch('catalog.json').then(r => r.json()),
      fetch('experiments.json').then(r => r.json()),
      fetch('assets3d.json').then(r => r.json()).catch(() => ({objects: {}}))
    ]).then(([catalog, experiments, assets]) => {
      state.catalog = catalog || [];
      state.experiments = experiments || {};
      state.assets = assets || {objects: {}};
      state.episodes = flattenEpisodes();
      fillFilters();
      renderSummary();
      selectInitialEpisode();
      applyInitialViewParams();
      bindEvents();
      renderAll();
    }).catch(err => {
      els['selected-title'].textContent = 'Gallery data failed to load';
      els['selected-subtitle'].textContent = err.message || String(err);
    });

    function bindEvents() {
      ['search', 'hand-filter', 'status-filter', 'scene-filter', 'object-filter'].forEach(id => {
        els[id].addEventListener('input', syncAfterFilterChange);
        els[id].addEventListener('change', syncAfterFilterChange);
      });

      els['episode-select'].addEventListener('change', () => {
        state.currentKey = els['episode-select'].value;
        const ep = currentEpisode();
        state.currentCamera = ep?.cameras?.[0] || null;
        renderAll();
      });

      ['object', 'pose', 'view'].forEach(name => {
        els[`${name}-header`].addEventListener('click', () => {
          state.openSelector = state.openSelector === name ? null : name;
          renderSelectorRows();
        });
      });

      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.mode = btn.dataset.mode;
          renderMainPanel();
        });
      });
    }

    function applyInitialViewParams() {
      const params = new URLSearchParams(location.search);
      const open = (params.get('selector') || params.get('open') || '').toLowerCase();
      if (['object', 'pose', 'view'].includes(open)) {
        state.openSelector = open;
      }
    }

    function flattenEpisodes() {
      const byId = new Map(state.catalog.map(obj => [obj.id, obj]));
      const episodes = [];
      Object.entries(state.experiments).forEach(([hand, objects]) => {
        Object.entries(objects || {}).forEach(([objId, grasps]) => {
          const obj = byId.get(objId) || {id: objId, name: titleize(objId), hands: {}, has_thumbnail: false};
          Object.entries(grasps || {}).forEach(([rank, exp]) => {
            const sceneInfo = Array.isArray(exp.scene_info) ? exp.scene_info : [];
            const cameras = Array.isArray(exp.cameras) ? exp.cameras : [];
            episodes.push({
              key: [hand, objId, rank].join('|'),
              hand,
              objId,
              objName: obj.name || titleize(objId),
              hasThumbnail: Boolean(obj.has_thumbnail),
              rank,
              rankLabel: `Grasp #${Number(rank) + 1}`,
              rankStr: padRank(rank),
              status: exp.status || 'unknown',
              scene: sceneInfo[0] || 'unknown',
              sceneInfo,
              dirIdx: exp.dir_idx || '',
              nTrials: exp.n_trials,
              nSuccess: exp.n_success,
              cameras,
              merged: exp.merged !== false,
              raw: exp
            });
          });
        });
      });
      return episodes.sort((a, b) =>
        a.objName.localeCompare(b.objName) ||
        a.hand.localeCompare(b.hand) ||
        Number(a.rank) - Number(b.rank)
      );
    }

    function fillFilters() {
      const scenes = [...new Set(state.episodes.map(ep => ep.scene).filter(Boolean))].sort();
      els['scene-filter'].innerHTML = '<option value="all">All scenes</option>' +
        scenes.map(scene => `<option value="${escapeHtml(scene)}">${escapeHtml(titleize(scene))}</option>`).join('');

      const usedObjects = new Set(state.episodes.map(ep => ep.objId));
      const objectOptions = state.catalog
        .filter(obj => usedObjects.has(obj.id))
        .sort((a, b) => a.name.localeCompare(b.name))
        .map(obj => `<option value="${escapeHtml(obj.id)}">${escapeHtml(obj.name)}</option>`);
      els['object-filter'].innerHTML = '<option value="all">All objects</option>' + objectOptions.join('');
    }

    function renderSummary() {
      const successes = state.episodes.filter(ep => ep.status === 'success').length;
      const fails = state.episodes.filter(ep => ep.status === 'fail').length;
      const objects = new Set(state.episodes.map(ep => ep.objId)).size;
      const cameraCounts = new Set(state.episodes.map(ep => ep.cameras.length));
      els['summary-pills'].innerHTML = [
        `<span class="chip accent">${state.episodes.length.toLocaleString()} episodes</span>`,
        `<span class="chip">${objects} objects</span>`,
        `<span class="chip ok">${successes} success</span>`,
        `<span class="chip warn">${fails} fail</span>`,
        `<span class="chip">${[...cameraCounts].sort((a, b) => a - b).join('/')} views</span>`
      ].join('');
    }

    function selectInitialEpisode() {
      const firstSuccess = state.episodes.find(ep => ep.status === 'success');
      const first = firstSuccess || state.episodes[0] || null;
      if (first) {
        state.currentKey = first.key;
        state.currentCamera = first.cameras[0] || null;
      }
    }

    function syncAfterFilterChange() {
      const visible = filteredEpisodes();
      if (!visible.some(ep => ep.key === state.currentKey)) {
        state.currentKey = visible[0]?.key || null;
        state.currentCamera = visible[0]?.cameras?.[0] || null;
      }
      renderAll();
    }

    function filters() {
      return {
        q: els['search'].value.trim().toLowerCase(),
        hand: els['hand-filter'].value,
        status: els['status-filter'].value,
        scene: els['scene-filter'].value,
        object: els['object-filter'].value
      };
    }

    function filteredEpisodes() {
      const f = filters();
      return state.episodes.filter(ep => {
        const haystack = [
          ep.objId,
          ep.objName,
          ep.hand,
          ep.rankLabel,
          ep.rank,
          ep.scene,
          ep.sceneInfo.join(' '),
          ep.dirIdx,
          ep.status
        ].join(' ').toLowerCase();
        return (!f.q || haystack.includes(f.q)) &&
          (f.hand === 'all' || ep.hand === f.hand) &&
          (f.status === 'all' || ep.status === f.status) &&
          (f.scene === 'all' || ep.scene === f.scene) &&
          (f.object === 'all' || ep.objId === f.object);
      });
    }

    function renderAll() {
      renderEpisodeSelect();
      renderMainPanel();
      renderSelectorRows();
    }

    function renderEpisodeSelect() {
      const visible = filteredEpisodes();
      if (!visible.length) {
        els['episode-select'].innerHTML = '<option value="">No matching episodes</option>';
        state.currentKey = null;
        return;
      }
      if (!visible.some(ep => ep.key === state.currentKey)) {
        state.currentKey = visible[0].key;
        state.currentCamera = visible[0].cameras[0] || null;
      }
      els['episode-select'].innerHTML = visible.map(ep => {
        const label = `${ep.objName} - ${titleize(ep.hand)} - ${ep.rankLabel} - ${titleize(ep.scene)} - ${ep.status}`;
        return `<option value="${escapeHtml(ep.key)}"${ep.key === state.currentKey ? ' selected' : ''}>${escapeHtml(label)}</option>`;
      }).join('');
    }

    function currentEpisode() {
      return state.episodes.find(ep => ep.key === state.currentKey) || null;
    }

    function renderMainPanel() {
      const ep = currentEpisode();
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === state.mode);
      });

      if (!ep) {
        els['selected-title'].textContent = 'No matching episode';
        els['selected-subtitle'].textContent = '';
        clearMedia();
        return;
      }

      if (!state.currentCamera || !ep.cameras.includes(state.currentCamera)) {
        state.currentCamera = ep.cameras[0] || null;
      }

      els['selected-title'].textContent = `${ep.objName} - ${titleize(ep.hand)} - ${ep.rankLabel}`;
      els['selected-subtitle'].textContent = `${titleize(ep.scene)} scene ${ep.sceneInfo.slice(1).join(' / ')} | view ${state.currentCamera || 'none'} | ${ep.status}`;

      if (state.mode === 'video') {
        showVideo(videoUrl(ep, state.currentCamera));
      } else {
        const model = modelUrl(ep);
        if (model) {
          showModel(model);
        } else {
          showPending('Interactive 3D pending', 'This viewer can load GLB or GLTF assets from the gallery manifest, but no reconstruction or trajectory asset is registered for this episode yet.');
        }
      }
    }

    function renderViewRow() {
      const ep = currentEpisode();
      const cameras = ep?.cameras || [];
      const open = state.openSelector === 'view';
      els['view-count'].textContent = cameras.length ? `${cameras.length} views` : '0 views';
      if (!open) {
        els['view-strip'].innerHTML = '';
        return;
      }
      if (!ep || !cameras.length) {
        els['view-strip'].innerHTML = '<div class="empty-inline">No camera streams listed for this episode.</div>';
        return;
      }
      els['view-strip'].innerHTML = cameras.map((cam, idx) =>
        `<button class="view-tile ${cam === state.currentCamera ? 'active' : ''}" data-camera="${escapeHtml(cam)}" title="${escapeHtml(cam)}">
          <video src="${videoUrl(ep, cam)}" muted playsinline preload="metadata"></video>
          <div class="tile-body">
            <div class="tile-title">View ${idx + 1}</div>
            <div class="tile-sub">${escapeHtml(cam)}</div>
          </div>
        </button>`
      ).join('');
      els['view-strip'].querySelectorAll('.view-tile').forEach(btn => {
        btn.addEventListener('click', () => {
          state.currentCamera = btn.dataset.camera;
          renderMainPanel();
          renderSelectorRows();
        });
        const vid = btn.querySelector('video');
        btn.addEventListener('mouseenter', () => vid.play().catch(() => {}));
        btn.addEventListener('mouseleave', () => {
          vid.pause();
          vid.currentTime = 0;
        });
      });
    }

    function showVideo(src) {
      els['pending-layer'].classList.remove('visible');
      els['model-viewer'].style.display = 'none';
      els['main-video'].style.display = 'block';
      if (els['main-video'].src !== src) {
        els['main-video'].src = src;
        els['main-video'].load();
      }
    }

    function showModel(src) {
      els['main-video'].pause();
      els['main-video'].removeAttribute('src');
      els['main-video'].load();
      els['main-video'].style.display = 'none';
      els['pending-layer'].classList.remove('visible');
      els['model-viewer'].style.display = 'block';
      els['model-viewer'].src = src;
    }

    function showPending(title, copy) {
      els['main-video'].pause();
      els['main-video'].removeAttribute('src');
      els['main-video'].load();
      els['main-video'].style.display = 'none';
      els['model-viewer'].removeAttribute('src');
      els['model-viewer'].style.display = 'none';
      els['pending-title'].textContent = title;
      els['pending-copy'].textContent = copy;
      els['pending-layer'].classList.add('visible');
    }

    function clearMedia() {
      els['view-strip'].innerHTML = '';
      showPending('No episode selected', 'Adjust filters to select an episode.');
    }

    function renderSelectorRows() {
      updateSelectorHeaders();
      ['object', 'pose', 'view'].forEach(name => {
        const open = state.openSelector === name;
        els[`${name}-selector`].classList.toggle('open', open);
        els[`${name}-header`].setAttribute('aria-expanded', String(open));
      });
      renderObjectRow();
      renderPoseRow();
      renderViewRow();
    }

    function updateSelectorHeaders() {
      const ep = currentEpisode();
      if (!ep) {
        els['object-value'].textContent = '-';
        els['pose-value'].textContent = '-';
        els['view-value'].textContent = '-';
        return;
      }
      const viewIndex = ep.cameras.indexOf(state.currentCamera);
      els['object-value'].textContent = ep.objName;
      els['pose-value'].textContent = `${ep.rankLabel} | ${titleize(ep.hand)} | ${ep.status}`;
      els['view-value'].textContent = viewIndex >= 0
        ? `View ${viewIndex + 1} | ${state.currentCamera}`
        : state.currentCamera || '-';
    }

    function renderObjectRow() {
      const open = state.openSelector === 'object';

      const f = filters();
      const episodes = state.episodes.filter(ep =>
        (f.hand === 'all' || ep.hand === f.hand) &&
        (f.status === 'all' || ep.status === f.status) &&
        (f.scene === 'all' || ep.scene === f.scene) &&
        (!f.q || `${ep.objId} ${ep.objName}`.toLowerCase().includes(f.q))
      );
      const byObject = new Map();
      episodes.forEach(ep => {
        const item = byObject.get(ep.objId) || {id: ep.objId, name: ep.objName, episodes: 0, success: 0, fail: 0, first: ep, hasThumbnail: ep.hasThumbnail};
        item.episodes += 1;
        if (ep.status === 'success') item.success += 1;
        if (ep.status === 'fail') item.fail += 1;
        byObject.set(ep.objId, item);
      });
      const items = [...byObject.values()].sort((a, b) => a.name.localeCompare(b.name));
      els['object-count'].textContent = `${items.length} objects`;
      if (!open) {
        els['object-strip'].innerHTML = '';
        return;
      }
      els['object-strip'].innerHTML = items.map(item => {
        const active = currentEpisode()?.objId === item.id;
        const thumb = item.hasThumbnail ? `objects/${item.id}/thumb.png` : '';
        return `<button class="object-tile ${active ? 'active' : ''}" data-object="${escapeHtml(item.id)}">
          ${thumb ? `<img src="${thumb}" alt="${escapeHtml(item.name)}" loading="lazy">` : '<div class="empty-inline">No thumbnail</div>'}
          <div class="tile-body">
            <div class="tile-title">${escapeHtml(item.name)}</div>
            <div class="tile-sub">${item.episodes} episodes</div>
            <div class="status-line">
              <span class="chip ok">${item.success} success</span>
              <span class="chip warn">${item.fail} fail</span>
            </div>
          </div>
        </button>`;
      }).join('') || '<div class="empty-inline">No matching objects.</div>';
      els['object-strip'].querySelectorAll('.object-tile').forEach(btn => {
        btn.addEventListener('click', () => {
          els['object-filter'].value = btn.dataset.object;
          syncAfterFilterChange();
        });
      });
    }

    function renderPoseRow() {
      const open = state.openSelector === 'pose';

      const ep = currentEpisode();
      if (!ep) {
        els['pose-count'].textContent = '0 poses';
        els['pose-strip'].innerHTML = '<div class="empty-inline">No episode selected.</div>';
        return;
      }
      const f = filters();
      const poseItems = state.episodes.filter(item =>
          item.objId === ep.objId &&
          (f.hand === 'all' || item.hand === f.hand) &&
          (f.status === 'all' || item.status === f.status) &&
          (f.scene === 'all' || item.scene === f.scene)
      ).slice(0, 48);
      els['pose-count'].textContent = `${poseItems.length} pose candidates`;
      if (!open) {
        els['pose-strip'].innerHTML = '';
        return;
      }
      els['pose-strip'].innerHTML = poseItems.map(item => {
        const active = item.key === state.currentKey;
        return `<button class="pose-tile ${active ? 'active' : ''}" data-key="${escapeHtml(item.key)}">
          <video src="${turntableUrl(item)}" muted loop playsinline preload="metadata"></video>
          <div class="tile-body">
            <div class="tile-title">${escapeHtml(item.rankLabel)}</div>
            <div class="tile-sub">${escapeHtml(titleize(item.hand))} | ${escapeHtml(titleize(item.scene))}</div>
            <div class="status-line">
              <span class="chip ${item.status === 'success' ? 'ok' : 'warn'}">${escapeHtml(item.status)}</span>
              <span class="chip">${item.cameras.length} views</span>
            </div>
          </div>
        </button>`;
      }).join('') || '<div class="empty-inline">No matching pose candidates.</div>';
      els['pose-strip'].querySelectorAll('.pose-tile').forEach(btn => {
        btn.addEventListener('click', () => {
          state.currentKey = btn.dataset.key;
          const next = currentEpisode();
          state.currentCamera = next?.cameras?.[0] || null;
          renderAll();
        });
        const vid = btn.querySelector('video');
        btn.addEventListener('mouseenter', () => vid.play().catch(() => {}));
        btn.addEventListener('mouseleave', () => {
          vid.pause();
          vid.currentTime = 0;
        });
      });
    }

    function videoUrl(ep, camera) {
      if (!ep || !camera) return '';
      return `${HF_BASE}/experiments/${ep.hand}/${ep.objId}/${ep.rankStr}/${camera}.mp4`;
    }

    function turntableUrl(ep) {
      return `${HF_BASE}/turntable/${ep.hand}/${ep.objId}/${ep.rankStr}/turntable.mp4`;
    }

    function modelUrl(ep) {
      const objects = state.assets.objects || {};
      const entry = objects[ep.objId] || {};
      const recon = entry.reconstructions || entry.episodes || {};
      const episodeAsset = recon[ep.key] || recon[ep.rankStr] || recon[ep.rank] || null;
      const candidate = episodeAsset?.url || episodeAsset?.glb || episodeAsset?.gltf ||
        entry.url || entry.glb || entry.gltf || '';
      return candidate ? resolveAssetUrl(candidate) : '';
    }

    function resolveAssetUrl(url) {
      if (!url) return '';
      if (/^https?:\/\//.test(url)) return url;
      const base = state.assets.base_url || '';
      return `${base}${url}`;
    }

    function padRank(rank) {
      return String(rank).padStart(3, '0');
    }

    function titleize(value) {
      return String(value || '')
        .replace(/_/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
